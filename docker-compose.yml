services:
  app:
    build: .
    container_name: buildwithus-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

      # MySQL
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=buildwithus
      - DB_USERNAME=root
      - DB_PASSWORD=root

      # Redis
      - SPRING_DATA_REDIS_ENABLED=true
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379

      # JWT
      - JWT_SECRET=${JWT_SECRET:-your-very-strong-secret-key-must-be-at-least-32-chars}

      # OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}

      # Cloudinary
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}

      # Groq AI
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - AI_REQUESTS_PER_HOUR=${AI_REQUESTS_PER_HOUR:-20}

      # Mail
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}

      # App / Frontend
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - SERVER_PORT=8080

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

    networks:
      - buildwithus-network

  mysql:
    image: mysql:8.0
    container_name: buildwithus-mysql
    environment:
      - MYSQL_DATABASE=buildwithus
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildwithus-network

  redis:
    image: redis:7-alpine
    container_name: buildwithus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - buildwithus-network

volumes:
  mysql_data:
  redis_data:

networks:
  buildwithus-network:
    driver: bridge