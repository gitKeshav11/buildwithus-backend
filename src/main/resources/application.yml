spring:
  application:
    name: build-with-us-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  main:
    allow-circular-references: true

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:buildwithus}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false

  data:
    redis:
      enabled: ${SPRING_DATA_REDIS_ENABLED:false}
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"

          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope:
              - read:user
              - user:email
            redirect-uri: "http://localhost:8080/login/oauth2/code/github"

          linkedin:
            client-id: ${LINKEDIN_CLIENT_ID:}
            client-secret: ${LINKEDIN_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "http://localhost:8080/login/oauth2/code/linkedin"
            client-name: LinkedIn
            scope:
              - openid
              - profile
              - email
            provider: linkedin

        provider:
          linkedin:
            issuer-uri: https://www.linkedin.com/oauth

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:your-very-strong-secret-key-must-be-at-least-32-chars}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

groq:
  api:
    key: ${GROQ_API_KEY:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  rate-limit:
    ai-requests-per-hour: ${AI_REQUESTS_PER_HOUR:20}

server:
  port: ${SERVER_PORT:8080}